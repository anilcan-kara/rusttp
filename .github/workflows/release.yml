name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: rusttp-linux-x64
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: rusttp-linux-arm64
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: rusttp-darwin-x64
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: rusttp-darwin-arm64
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: rusttp-win32-x64.exe
            use_cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross (if required)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary (Standard)
        if: ${{ !matrix.use_cross }}
        run: cargo build --target ${{ matrix.target }} --release

      - name: Build binary (Cross)
        if: matrix.use_cross
        run: cross build --target ${{ matrix.target }} --release

      - name: Prepare asset (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mv target\${{ matrix.target }}\release\rusttp.exe ${{ matrix.asset_name }}

      - name: Prepare asset (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mv target/${{ matrix.target }}/release/rusttp ${{ matrix.asset_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Flatten artifacts directory
        run: |
          mkdir dist
          find ./artifacts -type f -exec cp {} ./dist/ \;
          ls -la ./dist/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/rusttp-linux-x64
            dist/rusttp-linux-arm64
            dist/rusttp-darwin-x64
            dist/rusttp-darwin-arm64
            dist/rusttp-win32-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
